<div class="form-grid">
  <label class="wide">
    Шаблон провайдера
    {% include "_template_picker.html" %}
  </label>
  <label>
    Название аккаунта
    <input id="account-name" name="name" value="{{ account.name if account else '' }}" required placeholder="OnlineVDS основной">
  </label>
  <label>
    Провайдер
    <input id="account-provider" name="provider" value="{{ account.provider if account else '' }}" required placeholder="onlinevds.ru">
  </label>
  <label>
    Логин
    <input name="login" value="{{ account.login if account else '' }}" autocomplete="off" placeholder="email или username">
  </label>
  <label>
    Пароль / секрет
    <input type="password" name="auth_secret" value="" autocomplete="new-password" placeholder="{{ 'сохранён, оставьте пустым чтобы не менять' if account and account.auth_secret else 'пароль, API-ключ или заметка' }}">
    {% if account and account.auth_secret %}<small class="muted">Секрет сохранён и скрыт. Введите новый, чтобы изменить.</small>{% endif %}
  </label>
  <label class="wide">
    Ссылка на личный кабинет
    <input id="account-panel-url" name="panel_url" value="{{ account.panel_url if account else '' }}" placeholder="https://...">
  </label>
  <label class="wide">
    Ссылка на оплату по умолчанию
    <input id="account-payment-url" name="payment_url" value="{{ account.payment_url if account else '' }}" placeholder="https://...">
  </label>
  <label class="wide">
    Заметки
    <textarea id="account-notes" name="notes" rows="3" placeholder="2FA, где искать счета, особенности входа">{{ account.notes if account else '' }}</textarea>
  </label>
  <label>
    Тип интеграции
    <select id="account-integration-type" name="integration_type">
      <option value="manual" {% if not account or account.integration_type == 'manual' %}selected{% endif %}>Ручной</option>
      <option value="billmanager" {% if account and account.integration_type == 'billmanager' %}selected{% endif %}>BILLmanager</option>
    </select>
  </label>
  <label class="integration-field">
    URL биллинга (BILLmanager)
    <input id="account-integration-url" name="integration_url" value="{{ account.integration_url if account else '' }}" placeholder="https://billing.provider.ru">
  </label>
  <label class="integration-field checkbox-label">
    <input type="checkbox" id="account-auto-sync" name="auto_sync_enabled" value="on" {% if account and account.auto_sync_enabled %}checked{% endif %}>
    Автосинхронизация услуг и дат оплаты
  </label>
  <p class="integration-field muted wide" id="account-integration-hint">
    Ручной режим работает для любого хостера. BILLmanager-синхронизация подтягивает услуги, даты и суммы автоматически — подключение появится в следующем обновлении, поля можно заполнить заранее.
  </p>
</div>
<script>
  (() => {
    const templates = {{ provider_templates|tojson }};
    const templatePicker = document.querySelector(".form-grid [data-template-picker]");
    const setValue = (selector, value, overwrite = false) => {
      const field = document.querySelector(selector);
      if (!field || value === undefined || value === null || value === "") return;
      if (overwrite || !field.value) field.value = value;
    };
    const bootPicker = () => {
      if (!templatePicker || !window.initTemplatePicker) return;
      initTemplatePicker(templatePicker, templates, (item) => {
        if (!item) return;
        setValue("#account-name", item.name, true);
        setValue("#account-provider", item.domain || item.name, true);
        setValue("#account-panel-url", item.panel_url);
        setValue("#account-payment-url", item.payment_url || item.panel_url);
        const notes = [item.service_hint, item.notes].filter(Boolean).join("\n");
        setValue("#account-notes", notes);
      });
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", bootPicker);
    } else {
      bootPicker();
    }

    const integrationType = document.querySelector("#account-integration-type");
    const integrationFields = document.querySelectorAll(".integration-field");
    const toggleIntegration = () => {
      const show = integrationType && integrationType.value !== "manual";
      integrationFields.forEach((field) => {
        field.style.display = show ? "" : "none";
      });
    };
    if (integrationType) {
      integrationType.addEventListener("change", toggleIntegration);
      toggleIntegration();
    }
  })();
</script>
