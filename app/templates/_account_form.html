<div class="form-grid">
  <label class="wide">
    Шаблон провайдера
    {% include "_template_picker.html" %}
  </label>
  <label>
    Название аккаунта
    <input id="account-name" name="name" value="{{ account.name if account else '' }}" required placeholder="OneDash основной">
  </label>
  <label>
    Провайдер
    <input id="account-provider" name="provider" value="{{ account.provider if account else '' }}" required placeholder="rdp-onedash.ru">
  </label>
  <label id="account-login-field">
    Логин
    <input id="account-login" name="login" value="{{ account.login if account else '' }}" autocomplete="off" placeholder="email или username">
  </label>
  <label id="account-secret-field">
    <span id="account-secret-label">Пароль / секрет</span>
    <input type="password" id="account-auth-secret" name="auth_secret" value="" autocomplete="new-password" placeholder="{{ 'сохранён, оставьте пустым чтобы не менять' if account and account.auth_secret else 'пароль, API-ключ или заметка' }}">
    {% if account and account.auth_secret %}<small class="muted">Секрет сохранён и скрыт. Введите новый, чтобы изменить.</small>{% endif %}
  </label>
  <label class="wide" id="account-panel-field">
    <span>Ссылка на личный кабинет</span>
    <select id="billmanager-panel-preset" class="billmanager-preset-select" hidden>
      <option value="">— выберите хостера —</option>
      {% for preset in billmanager_presets|default([]) %}
      <option value="{{ preset.panel_url }}" data-billing="{{ preset.integration_url }}" data-payment="{{ preset.payment_url }}">{{ preset.name }}</option>
      {% endfor %}
      <option value="__custom__">Другой URL…</option>
    </select>
    <input id="account-panel-url" name="panel_url" value="{{ account.panel_url if account else '' }}" placeholder="https://my.qwins.co/billmgr?func=logon">
  </label>
  <label class="wide">
    Ссылка на оплату по умолчанию
    <input id="account-payment-url" name="payment_url" value="{{ account.payment_url if account else '' }}" placeholder="https://...">
  </label>
  <label class="wide">
    Заметки
    <textarea id="account-notes" name="notes" rows="3" placeholder="2FA, где искать счета, особенности входа">{{ account.notes if account else '' }}</textarea>
  </label>
  <label>
    Тип интеграции
    <select id="account-integration-type" name="integration_type">
      {% for option in integration_options %}
      <option value="{{ option.id }}" {% if (account and account.integration_type == option.id) or (not account and option.id == 'manual') %}selected{% endif %}>{{ option.label }}</option>
      {% endfor %}
    </select>
  </label>
  <label class="integration-field" id="account-integration-url-field">
    <span id="account-integration-url-label">URL API / биллинга</span>
    <select id="billmanager-billing-preset" class="billmanager-preset-select" hidden>
      <option value="">— выберите хостера —</option>
      {% for preset in billmanager_presets|default([]) %}
      <option value="{{ preset.integration_url }}" data-panel="{{ preset.panel_url }}" data-payment="{{ preset.payment_url }}">{{ preset.name }}</option>
      {% endfor %}
      <option value="__custom__">Другой URL…</option>
    </select>
    <input id="account-integration-url" name="integration_url" value="{{ account.integration_url if account else '' }}" placeholder="https://my.qwins.co/billmgr">
  </label>
  <label class="integration-field checkbox-label">
    <input type="checkbox" id="account-auto-sync" name="auto_sync_enabled" value="on" {% if account and account.auto_sync_enabled %}checked{% endif %}>
    Автосинхронизация услуг и дат оплаты
  </label>
  <div class="integration-field wide" id="onedash-addon-fields">
    {% set od = onedash_settings if onedash_settings is defined else {'static_ip': true, 'backup': true, 'nvme': false, 'processor': 'intel'} %}
    <p class="muted">Web API OneDash не передаёт доп. опции заказа. Отметьте их здесь — суммы продления будут считаться как в кабинете хостера.</p>
    <div class="checkbox-row">
      <label class="checkbox-label">
        <input type="checkbox" name="onedash_static_ip" value="on" {% if od.static_ip %}checked{% endif %}>
        Выделенный IP (+65 ₽/мес)
      </label>
      <label class="checkbox-label">
        <input type="checkbox" name="onedash_backup" value="on" {% if od.backup %}checked{% endif %}>
        Бэкап (+69 ₽/мес)
      </label>
      <label class="checkbox-label">
        <input type="checkbox" name="onedash_nvme" value="on" {% if od.nvme %}checked{% endif %}>
        NVMe (+79 ₽/мес)
      </label>
    </div>
    <label>
      Процессор
      <select name="onedash_processor">
        <option value="intel" {% if od.processor != 'amd' %}selected{% endif %}>Intel</option>
        <option value="amd" {% if od.processor == 'amd' %}selected{% endif %}>AMD (×2 к тарифу)</option>
      </select>
    </label>
  </div>
  <p class="integration-field muted wide" id="account-integration-hint"></p>
</div>
<script>
  (() => {
    const templates = {{ provider_templates|tojson }};
    const integrationOptions = {{ integration_options|tojson }};
    const templatePicker = document.querySelector(".form-grid [data-template-picker]");
    const integrationType = document.querySelector("#account-integration-type");
    const integrationFields = document.querySelectorAll(".integration-field");
    const integrationHint = document.querySelector("#account-integration-hint");
    const loginField = document.querySelector("#account-login-field");
    const secretLabel = document.querySelector("#account-secret-label");
    const secretInput = document.querySelector("#account-auth-secret");
    const urlLabel = document.querySelector("#account-integration-url-label");
    const urlField = document.querySelector("#account-integration-url-field");
    const onedashAddonFields = document.querySelector("#onedash-addon-fields");
    const panelField = document.querySelector("#account-panel-field");
    const billingPreset = document.querySelector("#billmanager-billing-preset");
    const panelPreset = document.querySelector("#billmanager-panel-preset");
    const billingInput = document.querySelector("#account-integration-url");
    const panelInput = document.querySelector("#account-panel-url");

    const setValue = (selector, value, overwrite = false) => {
      const field = document.querySelector(selector);
      if (!field || value === undefined || value === null || value === "") return;
      if (overwrite || !field.value) field.value = value;
    };

    const hintFor = (type) => {
      const item = integrationOptions.find((option) => option.id === type);
      return item?.hint || "";
    };

    const toggleBillmanagerPresetUi = (enabled) => {
      [billingPreset, panelPreset].forEach((select) => {
        if (!select) return;
        select.hidden = !enabled;
      });
    };

    const showCustomInput = (input, show) => {
      if (!input) return;
      input.style.display = show ? "" : "none";
    };

    const matchPresetSelect = (select, value) => {
      if (!select) return false;
      const normalized = (value || "").trim();
      if (!normalized) {
        select.value = "";
        return false;
      }
      for (const option of select.options) {
        if (option.value && option.value !== "__custom__" && option.value === normalized) {
          select.value = option.value;
          return true;
        }
      }
      select.value = "__custom__";
      return false;
    };

    const syncPresetSelectsFromInputs = () => {
      const billingMatched = matchPresetSelect(billingPreset, billingInput?.value);
      const panelMatched = matchPresetSelect(panelPreset, panelInput?.value);
      if (integrationType?.value === "billmanager") {
        showCustomInput(billingInput, !billingMatched && billingPreset?.value === "__custom__");
        showCustomInput(panelInput, !panelMatched && panelPreset?.value === "__custom__");
      }
    };

    const applyPresetOption = (option, source) => {
      if (!option || option.value === "__custom__") return;
      if (source === "billing") {
        setValue("#account-integration-url", option.value, true);
        if (option.dataset.panel) setValue("#account-panel-url", option.dataset.panel, true);
      } else if (source === "panel") {
        setValue("#account-panel-url", option.value, true);
        if (option.dataset.billing) setValue("#account-integration-url", option.dataset.billing, true);
      }
      if (option.dataset.payment) setValue("#account-payment-url", option.dataset.payment, true);
      matchPresetSelect(billingPreset, billingInput?.value);
      matchPresetSelect(panelPreset, panelInput?.value);
      showCustomInput(billingInput, false);
      showCustomInput(panelInput, false);
    };

    const applyIntegrationUi = () => {
      const type = integrationType?.value || "manual";
      const show = type !== "manual";
      const isBillmanager = type === "billmanager";
      integrationFields.forEach((field) => {
        field.style.display = show ? "" : "none";
      });
      if (integrationHint) integrationHint.textContent = hintFor(type);

      if (loginField) loginField.style.display = type === "onedash" ? "none" : "";
      if (secretLabel) {
        secretLabel.textContent =
          type === "onedash" ? "Api-Key OneDash" : type === "billmanager" ? "Пароль от кабинета" : "Пароль / секрет";
      }
      if (secretInput) {
        secretInput.placeholder =
          type === "onedash"
            ? "Api-Key из личного кабинета"
            : type === "billmanager"
              ? "пароль от личного кабинета хостера"
              : "пароль, API-ключ или заметка";
      }
      if (urlField) urlField.style.display = type === "onedash" ? "none" : show ? "" : "none";
      if (urlLabel) {
        urlLabel.textContent = type === "billmanager" ? "URL биллинга (BILLmanager)" : "URL API / биллинга";
      }
      if (onedashAddonFields) {
        onedashAddonFields.style.display = type === "onedash" ? "" : "none";
      }
      toggleBillmanagerPresetUi(isBillmanager);
      if (isBillmanager) {
        syncPresetSelectsFromInputs();
      } else {
        showCustomInput(billingInput, true);
        showCustomInput(panelInput, true);
      }
    };

    billingPreset?.addEventListener("change", () => {
      const option = billingPreset.selectedOptions[0];
      if (billingPreset.value === "__custom__") {
        showCustomInput(billingInput, true);
        billingInput?.focus();
        return;
      }
      applyPresetOption(option, "billing");
    });

    panelPreset?.addEventListener("change", () => {
      const option = panelPreset.selectedOptions[0];
      if (panelPreset.value === "__custom__") {
        showCustomInput(panelInput, true);
        panelInput?.focus();
        return;
      }
      applyPresetOption(option, "panel");
    });

    const bootPicker = () => {
      if (!templatePicker || !window.initTemplatePicker) return;
      initTemplatePicker(templatePicker, templates, (item) => {
        if (!item) return;
        setValue("#account-name", item.name, true);
        setValue("#account-provider", item.domain || item.name, true);
        setValue("#account-panel-url", item.panel_url);
        setValue("#account-payment-url", item.payment_url || item.panel_url);
        setValue("#account-integration-url", item.integration_url || item.panel_url);
        const notes = [item.service_hint, item.notes].filter(Boolean).join("\n");
        setValue("#account-notes", notes);
        if (item.integration_type && item.integration_type !== "manual" && integrationType) {
          integrationType.value = item.integration_type;
          applyIntegrationUi();
        }
        syncPresetSelectsFromInputs();
      });
    };

    if (integrationType) {
      integrationType.addEventListener("change", applyIntegrationUi);
      applyIntegrationUi();
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", bootPicker);
    } else {
      bootPicker();
    }
  })();
</script>
