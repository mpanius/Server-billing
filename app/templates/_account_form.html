<div class="form-grid">
  <label>
    Название аккаунта
    <input name="name" value="{{ account.name if account else '' }}" required placeholder="OnlineVDS основной">
  </label>
  <label>
    Провайдер
    <input name="provider" value="{{ account.provider if account else '' }}" required placeholder="onlinevds.ru">
  </label>
  <label>
    Логин
    <input name="login" value="{{ account.login if account else '' }}" autocomplete="off" placeholder="email или username">
  </label>
  <label>
    Пароль / секрет
    <input type="password" name="auth_secret" value="{{ account.auth_secret if account else '' }}" autocomplete="new-password" placeholder="локальный MVP">
  </label>
  <label class="wide">
    Ссылка на личный кабинет
    <input name="panel_url" value="{{ account.panel_url if account else '' }}" placeholder="https://...">
  </label>
  <label class="wide">
    Ссылка на оплату по умолчанию
    <input name="payment_url" value="{{ account.payment_url if account else '' }}" placeholder="https://...">
  </label>
  <label class="wide">
    Заметки
    <textarea name="notes" rows="3" placeholder="2FA, где искать счета, особенности входа">{{ account.notes if account else '' }}</textarea>
  </label>
</div>
