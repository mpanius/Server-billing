{% extends "base.html" %}
{% block content %}
<section class="page-head market-head">
  <div>
    <p class="eyebrow">Каталог хостеров</p>
    <h1>Провайдеры</h1>
    <p class="muted market-notice" id="market-notice">{{ catalog.notice }}</p>
  </div>
  <span class="market-count">{{ providers|length }} в каталоге</span>
</section>

<section class="panel market-promos-panel" id="market-promos"></section>

<section class="panel market-panel">
  <div class="market-toolbar">
    <div class="market-countries-scroll" id="market-countries"></div>
    <label class="market-search">
      <span class="sr-only">Поиск провайдера</span>
      <input type="search" id="market-search" placeholder="Поиск по названию или домену…" autocomplete="off">
    </label>
  </div>

  <div id="market-list-view">
    <div class="market-grid" id="market-grid"></div>
    <p class="muted market-empty hidden" id="market-empty">Для выбранной страны или запроса ничего не найдено.</p>
  </div>

  <div id="market-detail-view" hidden>
    <button type="button" class="link-button market-back" id="market-back">← К списку провайдеров</button>
    <div id="market-detail"></div>
  </div>
</section>

<script src="/static/providers-market.js" defer></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    if (!window.initProvidersMarket) return;
    initProvidersMarket({
      providers: {{ providers|tojson }},
      countries: {{ countries|tojson }},
      promos: {{ catalog.promos|tojson }},
      notice: {{ catalog.notice|tojson }},
    });
  });
</script>
{% endblock %}
