<div class="form-grid">
  <label class="wide">
    Шаблон провайдера
    {% include "_template_picker.html" %}
  </label>
  <label class="wide">
    Аккаунт хостинга
    <select id="server-hosting-account" name="hosting_account_id">
      <option value="0">Без привязки</option>
      {% for account in accounts %}
      <option value="{{ account.id }}" {% if server and server.hosting_account_id == account.id %}selected{% endif %}>
        {{ account.name }} · {{ account.provider }}
      </option>
      {% endfor %}
    </select>
  </label>
  <label>
    Название
    <input name="name" value="{{ server.name if server else '' }}" required placeholder="RDP Moscow 01">
  </label>
  <label>
    Провайдер
    <input id="server-provider" name="provider" value="{{ server.provider if server else '' }}" required placeholder="onlinevds.ru">
  </label>
  <label>
    IP
    <input name="ip_address" value="{{ server.ip_address if server else '' }}" placeholder="192.0.2.10">
  </label>
  <label>
    Страна / локация
    <input id="server-location" name="location" value="{{ server.location if server else '' }}" placeholder="Нидерланды">
  </label>
  <label>
    Логин сервера
    <input name="server_login" value="{{ server.server_login if server else '' }}" placeholder="root">
  </label>
  <label>
    Пароль сервера
    <input type="password" name="server_password" value="" autocomplete="new-password" placeholder="{{ 'сохранён, оставьте пустым чтобы не менять' if server and server.server_password else 'пароль от сервера' }}">
    {% if server and server.server_password %}<small class="muted">Пароль сохранён и скрыт. Введите новый, чтобы изменить.</small>{% endif %}
  </label>
  <label>
    SSH порт
    <input type="number" min="1" max="65535" name="ssh_port" value="{{ server.ssh_port if server else '22' }}" placeholder="22">
  </label>
  <label>
    Домен для проверки SSL
    <input name="ssl_host" value="{{ server.ssl_host if server else '' }}" placeholder="example.com (необязательно)">
  </label>
  <label>
    ID услуги
    <input name="service_id" value="{{ server.service_id if server else '' }}" placeholder="vds-1021">
  </label>
  <label>
    Сумма
    <input type="number" step="0.01" min="0" name="amount" value="{{ server.amount if server else '0' }}">
  </label>
  <label>
    Валюта
    <select id="server-currency" name="currency">
      {% set selected_currency = server.currency if server else "RUB" %}
      <option value="RUB" {% if selected_currency == "RUB" %}selected{% endif %}>RUB · рубли</option>
      <option value="USD" {% if selected_currency == "USD" %}selected{% endif %}>USD · доллары</option>
      <option value="EUR" {% if selected_currency == "EUR" %}selected{% endif %}>EUR · евро</option>
      <option value="USDT" {% if selected_currency == "USDT" %}selected{% endif %}>USDT · Tether</option>
    </select>
  </label>
  <label>
    Период, дней
    <input id="server-period" type="number" min="1" name="billing_period_days" value="{{ server.billing_period_days if server else '30' }}">
  </label>
  <label>
    Следующая оплата
    <input
      type="date"
      name="next_payment_date"
      value="{{ server.next_payment_date.isoformat() if server else '' }}"
      required
    >
  </label>
  <label class="wide">
    Ссылка на оплату
    <input id="server-payment-url" name="payment_url" value="{{ server.payment_url if server else '' }}" placeholder="https://...">
  </label>
  <label class="wide">
    Личный кабинет
    <input id="server-panel-url" name="panel_url" value="{{ server.panel_url if server else '' }}" placeholder="https://...">
  </label>
  <label class="wide">
    Заметки
    <textarea id="server-notes" name="notes" rows="3" placeholder="Что важно помнить">{{ server.notes if server else '' }}</textarea>
  </label>
  <label class="wide checkbox-label">
    <input type="checkbox" name="sync_locked" value="on" {% if server and server.sync_locked %}checked{% endif %}>
    Не перезаписывать при автосинхронизации (защитить ручные правки)
  </label>
</div>
<script>
  (() => {
    const templates = {{ provider_templates|tojson }};
    const accounts = {{ account_options|default([])|tojson }};
    const templatePicker = document.querySelector("[data-template-picker]");
    const accountSelect = document.querySelector("#server-hosting-account");
    const setValue = (selector, value, overwrite = false) => {
      const field = document.querySelector(selector);
      if (!field || value === undefined || value === null || value === "") return;
      if (overwrite || !field.value) field.value = value;
    };
    const applyTemplate = (item) => {
      if (!item) return;
      setValue("#server-provider", item.domain || item.name, true);
      setValue("#server-panel-url", item.panel_url);
      setValue("#server-payment-url", item.payment_url || item.panel_url);
      setValue("#server-period", item.billing_period_days, true);
      setValue("#server-currency", item.default_currency, true);
      const notes = [item.service_hint, item.notes].filter(Boolean).join("\n");
      setValue("#server-notes", notes);
    };
    const bootPicker = () => {
      if (templatePicker && window.initTemplatePicker) {
        initTemplatePicker(templatePicker, templates, (item) => applyTemplate(item));
      }
    };
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", bootPicker);
    } else {
      bootPicker();
    }
    accountSelect?.addEventListener("change", () => {
      const item = accounts.find((account) => String(account.id) === accountSelect.value);
      if (!item) return;
      setValue("#server-provider", item.provider, true);
      setValue("#server-panel-url", item.panel_url);
      setValue("#server-payment-url", item.payment_url || item.panel_url);
    });
  })();
</script>
