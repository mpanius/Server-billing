<div class="form-grid">
  <label class="wide">
    Аккаунт хостинга
    <select name="hosting_account_id">
      <option value="0">Без привязки</option>
      {% for account in accounts %}
      <option value="{{ account.id }}" {% if server and server.hosting_account_id == account.id %}selected{% endif %}>
        {{ account.name }} · {{ account.provider }}
      </option>
      {% endfor %}
    </select>
  </label>
  <label>
    Название
    <input name="name" value="{{ server.name if server else '' }}" required placeholder="RDP Moscow 01">
  </label>
  <label>
    Провайдер
    <input name="provider" value="{{ server.provider if server else '' }}" required placeholder="onlinevds.ru">
  </label>
  <label>
    IP
    <input name="ip_address" value="{{ server.ip_address if server else '' }}" placeholder="192.0.2.10">
  </label>
  <label>
    ID услуги
    <input name="service_id" value="{{ server.service_id if server else '' }}" placeholder="vds-1021">
  </label>
  <label>
    Сумма
    <input type="number" step="0.01" min="0" name="amount" value="{{ server.amount if server else '0' }}">
  </label>
  <label>
    Валюта
    <input name="currency" value="{{ server.currency if server else 'RUB' }}" maxlength="8">
  </label>
  <label>
    Период, дней
    <input type="number" min="1" name="billing_period_days" value="{{ server.billing_period_days if server else '30' }}">
  </label>
  <label>
    Следующая оплата
    <input type="date" name="next_payment_date" value="{{ server.next_payment_date.isoformat() if server else '' }}" required>
  </label>
  <label class="wide">
    Ссылка на оплату
    <input name="payment_url" value="{{ server.payment_url if server else '' }}" placeholder="https://...">
  </label>
  <label class="wide">
    Личный кабинет
    <input name="panel_url" value="{{ server.panel_url if server else '' }}" placeholder="https://...">
  </label>
  <label class="wide">
    Заметки
    <textarea name="notes" rows="3" placeholder="Что важно помнить">{{ server.notes if server else '' }}</textarea>
  </label>
</div>
